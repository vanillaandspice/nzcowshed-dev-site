name: Check Astro Updates

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Check for outdated packages
        run: npx npm-check-updates --filter "astro,@astrojs/*,react,react-dom" --format group

      - name: Apply updates to package.json
        run: npx npm-check-updates --filter "astro,@astrojs/*,react,react-dom" -u

      - name: Install updated packages
        run: npm install

      - name: Test build
        run: npm run build

      - name: Open PR if changes exist
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Astro and React dependencies'
          title: 'chore: weekly Astro dependency updates'
          body: |
            Automated weekly dependency update for Astro and React packages.

            **Review before merging:**
            - Check the build passed in CI
            - Preview the Vercel deployment on this PR
            - Merge when satisfied
          branch: chore/astro-updates
          delete-branch: true
