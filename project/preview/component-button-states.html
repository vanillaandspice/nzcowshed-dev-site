<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Button States</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--surface-container-lowest); color: var(--text-main); }
  .wrap { padding: 18px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .btn { font-family: var(--font-heading); font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase; min-height: 44px; padding: 0 24px; border-radius: 0; display: inline-flex; align-items: center; justify-content: center; border: none; background: var(--safety-orange); color: var(--concrete-white); }
  .btn.hover { filter: brightness(0.9); }
  .btn.press { transform: scale(0.95); }
  .btn.disabled { opacity: 0.5; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-main); }
  .meta { font-family: ui-monospace, monospace; font-size: 10px; color: var(--on-surface-variant); }
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="col"><div class="label">Default</div><button class="btn">Submit</button><div class="meta">filter: none</div></div>
    <div class="col"><div class="label">Hover</div><button class="btn hover">Submit</button><div class="meta">brightness(0.9)</div></div>
    <div class="col"><div class="label">Press</div><button class="btn press">Submit</button><div class="meta">scale(0.95)</div></div>
    <div class="col"><div class="label">Disabled</div><button class="btn disabled">Submit</button><div class="meta">opacity 0.5</div></div>
  </div>
</div>
</body>
</html>
