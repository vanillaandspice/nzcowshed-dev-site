<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radius Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--surface-container-lowest); color: var(--text-main); }
  .wrap { padding: 18px 24px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 84px; height: 60px; background: var(--deep-purple); }
  .name { font-family: var(--font-heading); letter-spacing: 0.05em; font-size: 12px; color: var(--text-main); }
  .meta { font-family: ui-monospace, monospace; font-size: 10px; color: var(--on-surface-variant); }
  .note { font-family: var(--font-body); font-size: 11px; color: var(--on-surface-variant); margin-top: 14px; line-height: 1.4; }
  .note b { color: var(--deep-purple); }
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="item"><div class="box" style="border-radius: 0;"></div><div class="name">NONE</div><div class="meta">0 · CTAs, groove</div></div>
    <div class="item"><div class="box" style="border-radius: 0.125rem;"></div><div class="name">SM</div><div class="meta">0.125rem · 2px</div></div>
    <div class="item"><div class="box" style="border-radius: 0.25rem;"></div><div class="name">DEFAULT</div><div class="meta">0.25rem · 4px</div></div>
    <div class="item"><div class="box" style="border-radius: 0.375rem;"></div><div class="name">MD</div><div class="meta">0.375rem · 6px</div></div>
    <div class="item"><div class="box" style="border-radius: 0.5rem;"></div><div class="name">LG</div><div class="meta">0.5rem · 8px</div></div>
    <div class="item"><div class="box" style="border-radius: 9999px;"></div><div class="name">FULL</div><div class="meta">pill</div></div>
  </div>
  <div class="note"><b>Rule:</b> CTAs and groove-pattern elements use <b>0 (sharp)</b>. Cards, inputs, surfaces use the <b>0.25rem default</b>. The brand never reaches for radius LG or FULL on its own.</div>
</div>
</body>
</html>
