<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Stat Callout</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--surface-container-lowest); color: var(--text-main); }
  .wrap { padding: 14px 24px; }
  .stat { background: var(--primary); padding: 22px 24px; text-align: center; }
  .num { font-family: var(--font-heading); font-size: 80px; line-height: 0.9; color: var(--teal); letter-spacing: 0.02em; }
  .label { font-family: var(--font-body); font-size: 14px; color: #fff; margin-top: 6px; }
  .sub { font-family: var(--font-body); font-size: 14px; font-weight: 700; color: #fff; }
  .attr { font-family: var(--font-body); font-size: 12px; font-style: italic; color: rgba(255,255,255,0.7); margin-top: 8px; line-height: 1.3; }
  .biz  { font-family: var(--font-body); font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; line-height: 1.3; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stat">
    <div class="num">15,000</div>
    <div class="label">cattle movements through one yard since we grooved it.</div>
    <div class="sub">Not a single problem.</div>
    <div class="attr">— Gordon Wright</div>
    <div class="biz">Wright Family Farm, Waikato</div>
  </div>
</div>
</body>
</html>
