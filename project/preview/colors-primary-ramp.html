<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MD3 Primary Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--surface-container-lowest); }
  .wrap { padding: 18px 24px; }
  h4 { font-family: var(--font-heading); letter-spacing: 0.05em; font-size: 13px; margin: 0 0 12px; color: var(--on-surface-variant); }
  .row { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; }
  .sw { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 56px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.06); display: flex; align-items: flex-end; justify-content: flex-start; padding: 6px; }
  .chip span { font-family: ui-monospace, monospace; font-size: 9px; }
  .name { font-family: var(--font-body); font-size: 10px; color: var(--on-surface-variant); line-height: 1.2; }
</style>
</head>
<body>
<div class="wrap">
  <h4>MD3 PRIMARY — PURPLE RAMP</h4>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#250259;"><span style="color:#fff">#250259</span></div><div class="name">primary</div></div>
    <div class="sw"><div class="chip" style="background:#3B1F6E;"><span style="color:#fff">#3B1F6E</span></div><div class="name">primary-container</div></div>
    <div class="sw"><div class="chip" style="background:#523786;"><span style="color:#fff">#523786</span></div><div class="name">on-primary-fixed-variant</div></div>
    <div class="sw"><div class="chip" style="background:#6a4f9f;"><span style="color:#fff">#6A4F9F</span></div><div class="name">surface-tint</div></div>
    <div class="sw"><div class="chip" style="background:#a68adf;"><span style="color:#1A1A1A">#A68ADF</span></div><div class="name">on-primary-container</div></div>
    <div class="sw"><div class="chip" style="background:#d3bbff;"><span style="color:#1A1A1A">#D3BBFF</span></div><div class="name">inverse-primary</div></div>
    <div class="sw"><div class="chip" style="background:#eaddff;"><span style="color:#1A1A1A">#EADDFF</span></div><div class="name">primary-fixed</div></div>
    <div class="sw"><div class="chip" style="background:#cbc4d2;"><span style="color:#1A1A1A">#CBC4D2</span></div><div class="name">outline-variant</div></div>
    <div class="sw"><div class="chip" style="background:#ffffff; border:1px solid #e1e3e4;"><span style="color:#1A1A1A">#FFFFFF</span></div><div class="name">on-primary</div></div>
  </div>
</div>
</body>
</html>
